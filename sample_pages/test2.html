<!DOCTYPE html>
<html>
<head>
<title>Test 2: Colors and Blocks</title>
<style>
body { background: #f5f5f5; margin: 0; font-family: sans-serif; }
.header { background: #2c3e50; color: white; padding: 20px; }
.content { padding: 20px; }
.block { background: white; border: 2px solid #3498db; padding: 15px; margin: 15px 0; }
.red-box { background: #e74c3c; color: white; padding: 10px; margin: 10px; }
.green-box { background: #27ae60; color: white; padding: 10px; margin: 10px; }
h1 { color: white; margin: 0; }
h2 { color: #2c3e50; }
</style>
</head>
<body>
<div class="header">
  <h1>Site Header</h1>
</div>
<div class="content">
  <div class="block">
    <h2>Block One</h2>
    <p>This block has a colored border and white background.</p>
  </div>
  <div class="block">
    <h2>Block Two</h2>
    <p>Another block with the same styling.</p>
  </div>
  <div style="display: flex;">
    <div class="red-box">Red</div>
    <div class="green-box">Green</div>
  </div>
</div>
</body>
</html>
